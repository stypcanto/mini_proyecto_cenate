# ========================================================================
# 🌐 NGINX CONFIG – FRONTEND CENATE 2025
# ------------------------------------------------------------------------
# ✅ React Router (SPA)
# ✅ Imágenes servidas con alias
# ✅ Proxy al backend Spring Boot
# ✅ Compatible con Apple Silicon / Linux AMD64
# ========================================================================

server {
  listen 80;
  server_name localhost;

  # Carpeta raíz del build de React
  root /usr/share/nginx/html;
  index index.html;

  # =====================================================================
  # 🖼️ SERVIR IMÁGENES CORRECTAMENTE
  # ---------------------------------------------------------------------
  # Alias evita el error 404 por duplicar /images/images/
  # y asegura acceso directo a las imágenes copiadas en el contenedor.
  # =====================================================================
  location ^~ /images/ {
    alias /usr/share/nginx/html/images/;
    autoindex off;
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # =====================================================================
  # ⚛️ REACT ROUTER (Single Page Application)
  # ---------------------------------------------------------------------
  # Redirige cualquier ruta no estática hacia index.html
  # =====================================================================
  location / {
    try_files $uri /index.html;
  }

  # =====================================================================
  # 🔗 PROXY HACIA BACKEND SPRING BOOT
  # ---------------------------------------------------------------------
  # Envía todas las peticiones /api/ al contenedor "backend"
  # =====================================================================
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  # =====================================================================
  # 🪵 LOGS
  # =====================================================================
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;
}